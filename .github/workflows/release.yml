name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore DeskVerse.sln

      - name: Publish framework-dependent
        run: dotnet publish DeskVerse.csproj -c Release -r win-x64 --self-contained false /p:PublishSingleFile=true -o artifacts/framework-dependent

      - name: Publish self-contained
        run: dotnet publish DeskVerse.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true -o artifacts/self-contained

      - name: Package artifacts
        shell: pwsh
        run: |
          Compress-Archive -Path artifacts/framework-dependent/* -DestinationPath DeskVerse-win-x64-framework-dependent.zip
          Compress-Archive -Path artifacts/self-contained/* -DestinationPath DeskVerse-win-x64-self-contained.zip

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DeskVerse-win-x64
          path: |
            DeskVerse-win-x64-framework-dependent.zip
            DeskVerse-win-x64-self-contained.zip

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            DeskVerse-win-x64-framework-dependent.zip
            DeskVerse-win-x64-self-contained.zip
