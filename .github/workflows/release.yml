name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore tests
        run: dotnet restore tests/DeskVerse.Tests/DeskVerse.Tests.csproj

      - name: Restore app
        run: dotnet restore DeskVerse.csproj -r win-x64

      - name: Build
        run: dotnet build DeskVerse.sln --configuration Release --no-restore

      - name: Test
        run: dotnet run --project tests/DeskVerse.Tests/DeskVerse.Tests.csproj --configuration Release --no-build

      - name: Publish framework-dependent
        run: dotnet publish DeskVerse.csproj -c Release -r win-x64 --self-contained false --no-restore /p:PublishSingleFile=true -o artifacts/framework-dependent

      - name: Publish self-contained
        run: dotnet publish DeskVerse.csproj -c Release -r win-x64 --self-contained true --no-restore /p:PublishSingleFile=true -o artifacts/self-contained

      - name: Package artifacts
        shell: pwsh
        run: |
          Compress-Archive -Path artifacts/framework-dependent/* -DestinationPath DeskVerse-win-x64-framework-dependent.zip
          Compress-Archive -Path artifacts/self-contained/* -DestinationPath DeskVerse-win-x64-self-contained.zip

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DeskVerse-win-x64
          path: |
            DeskVerse-win-x64-framework-dependent.zip
            DeskVerse-win-x64-self-contained.zip

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $notes = @"
          ## 下载哪个包？

          - ``DeskVerse-win-x64-self-contained.zip``
            - 推荐给大多数用户。
            - 体积较大，但不需要额外安装 .NET。

          - ``DeskVerse-win-x64-framework-dependent.zip``
            - 体积更小。
            - 需要电脑上已安装 .NET 9 Desktop Runtime。

          ## 使用方式

          1. 下载并解压 zip 文件。
          2. 运行 ``DeskVerse.exe``。
          3. 右键桌面小组件或托盘图标打开菜单。

          ## English

          Choose ``self-contained`` if you want the easiest install. Choose ``framework-dependent`` if you already have the .NET 9 Desktop Runtime installed and prefer a smaller download.

          "@

          gh release create $env:GITHUB_REF_NAME `
            DeskVerse-win-x64-framework-dependent.zip `
            DeskVerse-win-x64-self-contained.zip `
            --verify-tag `
            --generate-notes `
            --notes "$notes"
