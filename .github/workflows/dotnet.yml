name: Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore app
        run: dotnet restore DeskVerse.csproj

      - name: Restore tests
        run: dotnet restore tests/DeskVerse.Tests/DeskVerse.Tests.csproj

      - name: Build
        run: dotnet build DeskVerse.sln --configuration Release --no-restore

      - name: Test
        run: dotnet run --project tests/DeskVerse.Tests/DeskVerse.Tests.csproj --configuration Release --no-build
