    <path d="M8 12h13M8 17h10M8 22h7" stroke="#20252f" stroke-width="2" stroke-linecap="round"/>
    <text x="40" y="20" font-family="Segoe UI, sans-serif" font-size="16" font-weight="600" fill="#f4f6f2">DeskVerse</text>
