<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-label="DeskVerse preview">
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111821"/>
      <stop offset="1" stop-color="#202833"/>
    </linearGradient>
    <linearGradient id="wallpaper" x1="96" y1="72" x2="864" y2="306" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#19212b"/>
      <stop offset=".42" stop-color="#56606a"/>
      <stop offset=".72" stop-color="#c7a36f"/>
      <stop offset="1" stop-color="#35414b"/>
    </linearGradient>
    <radialGradient id="sun" cx="32%" cy="56%" r="48%">
      <stop offset="0" stop-color="#f0ca8d" stop-opacity=".92"/>
      <stop offset=".42" stop-color="#c69662" stop-opacity=".34"/>
      <stop offset="1" stop-color="#111821" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="220" y1="78" x2="650" y2="162" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fbff" stop-opacity=".42"/>
      <stop offset=".55" stop-color="#d9e7f7" stop-opacity=".22"/>
      <stop offset="1" stop-color="#1c2430" stop-opacity=".2"/>
    </linearGradient>
    <linearGradient id="glassEdge" x1="228" y1="44" x2="592" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".52"/>
      <stop offset=".52" stop-color="#ffffff" stop-opacity=".16"/>
      <stop offset="1" stop-color="#070b12" stop-opacity=".18"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-80%" width="140%" height="260%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#05080d" flood-opacity=".34"/>
    </filter>
  </defs>

  <rect width="960" height="360" rx="28" fill="url(#page)"/>

  <g transform="translate(70 48)">
    <rect width="820" height="264" rx="22" fill="#0c1219"/>
    <rect x="1" y="1" width="818" height="262" rx="21" fill="url(#wallpaper)"/>
    <rect x="1" y="1" width="818" height="262" rx="21" fill="url(#sun)"/>
    <path d="M0 199c95-27 173-35 268-16 87 17 138 48 230 26 84-20 145-58 245-43 27 4 52 11 77 21v77H0z" fill="#202932" opacity=".88"/>
    <path d="M0 226c96-19 194-21 294-3 91 16 151 38 246 16 88-20 163-28 280 14v11H0z" fill="#121a23" opacity=".8"/>

    <g filter="url(#shadow)">
      <rect x="202" y="40" width="416" height="86" rx="24" fill="#29313b" opacity=".62"/>
      <rect x="203" y="41" width="414" height="84" rx="23" fill="url(#glass)"/>
      <path d="M224 45h372" stroke="#ffffff" stroke-opacity=".42" stroke-width="1.4" stroke-linecap="round"/>
      <path d="M265 78c70-20 126 13 194-3 41-10 72-15 112 0" fill="none" stroke="#ffffff" stroke-opacity=".28" stroke-width="1.2" stroke-linecap="round"/>
      <rect x="202.75" y="40.75" width="414.5" height="84.5" rx="23.25" fill="none" stroke="url(#glassEdge)" stroke-width="1.5"/>
      <rect x="206.5" y="44.5" width="407" height="77" rx="20" fill="none" stroke="#ffffff" stroke-opacity=".13"/>
      <text x="410" y="79" text-anchor="middle" font-family="Microsoft YaHei UI, Segoe UI, sans-serif" font-size="21" fill="#f8faf7">山中何事？松花酿酒，春水煎茶。</text>
      <text x="410" y="105" text-anchor="middle" font-family="Microsoft YaHei UI, Segoe UI, sans-serif" font-size="12" fill="#d7dfdd">《人月圆·山中书事》 · 张可久</text>
    </g>
  </g>

  <g transform="translate(84 72)">
    <circle cx="0" cy="0" r="5" fill="#ff6b5f"/>
    <circle cx="18" cy="0" r="5" fill="#f6c65b"/>
    <circle cx="36" cy="0" r="5" fill="#61c277"/>
  </g>

  <g transform="translate(72 20)">
