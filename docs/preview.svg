<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-label="DeskVerse preview">
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111821"/>
      <stop offset="1" stop-color="#202833"/>
    </linearGradient>
    <linearGradient id="wallpaper" x1="96" y1="72" x2="864" y2="306" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#19212b"/>
      <stop offset=".42" stop-color="#56606a"/>
      <stop offset=".72" stop-color="#c7a36f"/>
      <stop offset="1" stop-color="#35414b"/>
    </linearGradient>
    <radialGradient id="sun" cx="32%" cy="56%" r="48%">
      <stop offset="0" stop-color="#f0ca8d" stop-opacity=".92"/>
      <stop offset=".42" stop-color="#c69662" stop-opacity=".34"/>
      <stop offset="1" stop-color="#111821" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="232" y1="62" x2="588" y2="126" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fbff" stop-opacity=".34"/>
      <stop offset=".58" stop-color="#dce6ef" stop-opacity=".18"/>
      <stop offset="1" stop-color="#323943" stop-opacity=".12"/>
    </linearGradient>
    <linearGradient id="glassEdge" x1="230" y1="50" x2="590" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".38"/>
      <stop offset=".62" stop-color="#ffffff" stop-opacity=".14"/>
      <stop offset="1" stop-color="#070b12" stop-opacity=".1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-80%" width="140%" height="260%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#05080d" flood-opacity=".34"/>
    </filter>
  </defs>

  <rect width="960" height="360" rx="28" fill="url(#page)"/>

  <g transform="translate(70 48)">
    <rect width="820" height="264" rx="22" fill="#0c1219"/>
    <rect x="1" y="1" width="818" height="262" rx="21" fill="url(#wallpaper)"/>
    <rect x="1" y="1" width="818" height="262" rx="21" fill="url(#sun)"/>
    <path d="M0 199c95-27 173-35 268-16 87 17 138 48 230 26 84-20 145-58 245-43 27 4 52 11 77 21v77H0z" fill="#202932" opacity=".88"/>
    <path d="M0 226c96-19 194-21 294-3 91 16 151 38 246 16 88-20 163-28 280 14v11H0z" fill="#121a23" opacity=".8"/>

    <g filter="url(#shadow)">
      <rect x="218" y="48" width="384" height="64" rx="31" fill="#4d535c" opacity=".54"/>
      <rect x="219" y="49" width="382" height="62" rx="30" fill="url(#glass)"/>
      <path d="M246 52h328" stroke="#ffffff" stroke-opacity=".32" stroke-width="1.2" stroke-linecap="round"/>
      <rect x="218.75" y="48.75" width="382.5" height="62.5" rx="30" fill="none" stroke="url(#glassEdge)" stroke-width="1.5"/>
      <rect x="222.5" y="52.5" width="375" height="55" rx="27" fill="none" stroke="#ffffff" stroke-opacity=".1"/>
      <text x="410" y="76" text-anchor="middle" font-family="Microsoft YaHei UI, Segoe UI, sans-serif" font-size="17" fill="#fafbf8">山中何事？松花酿酒，春水煎茶。</text>
      <text x="410" y="96" text-anchor="middle" font-family="Microsoft YaHei UI, Segoe UI, sans-serif" font-size="10.5" fill="#d9dfdd">《人月圆·山中书事》 · 张可久</text>
    </g>
  </g>

  <g transform="translate(84 72)">
    <circle cx="0" cy="0" r="5" fill="#ff6b5f"/>
    <circle cx="18" cy="0" r="5" fill="#f6c65b"/>
    <circle cx="36" cy="0" r="5" fill="#61c277"/>
  </g>

  <g transform="translate(72 20)">
    <rect width="28" height="28" rx="7" fill="#f3efe3"/>
    <path d="M8 12h13M8 17h10M8 22h7" stroke="#20252f" stroke-width="2" stroke-linecap="round"/>
    <text x="40" y="20" font-family="Segoe UI, sans-serif" font-size="16" font-weight="600" fill="#f4f6f2">DeskVerse</text>
  </g>
